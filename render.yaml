services:
  # ─── Игровой сервер ───────────────────────────────────────────
  - type: web
    name: labirint-server
    env: node
    plan: starter
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

  # ─── Клиент (статический сайт) ────────────────────────────────
  - type: web
    name: labirint-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SERVER_URL
        sync: false  # Render попросит ввести URL сервера вручную
